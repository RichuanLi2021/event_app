# global defaults
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# scrape targets
scrape_configs:
  - job_name: 'eventflow-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5174']

  # Node exporter for host CPU and memory
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
